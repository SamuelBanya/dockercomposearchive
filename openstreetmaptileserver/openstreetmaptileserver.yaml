version: '3'

services:
  map:
    image: overv/openstreetmap-tile-server
    volumes:
      - osm-data:/data/database/
    ports:
    # Just using this port number, cause why not, Van Halen is like the true map to our hearts lol:
      - "5150:80"
    command: "run"

volumes:
  osm-data:
    external: true