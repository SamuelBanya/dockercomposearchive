version: '3.8'
services:
  kiwix-wikipedia2007:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: kiwix-wikipedia2007
    volumes:
      - /home/sam/hoard/ZimFiles/wikipedia_en_wp1-0.5_2007-03.zim:/data/wikipedia2007.zim
    command: ["/data/content.zim"]
    ports:
      - "8082:8080" # Maps host 8082 to container 8080
    restart: unless-stopped

