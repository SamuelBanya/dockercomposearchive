version: '3.8'

services:
  arch-wiki-09-2025:
    image: ghcr.io/kiwix/kiwix-serve:latest
    container_name: arch-wiki-09-2025
    # Link for actual Zim file:
    # https://download.kiwix.org/zim/other/archlinux_en_all_maxi_2025-09.zim
    volumes:
      - /home/sam/hoard/ZimFiles/archlinux_en_all_maxi_2025-09.zim:/data/archwiki-09-2025.zim
    command: ["/data/archwiki-09-2025.zim"]
    ports:
      - "8082:8080"
    restart: unless-stopped

