    # Link for actual Zim file:
    # https://download.kiwix.org/zim/other/stardewvalleywiki_en_all_2026-01.zim
    volumes:
      - /home/sam/hoard/ZimFiles/stardewvalleywiki_en_all_2026-01.zim:/data/stardewvalleywiki-01-2026.zim
    command: ["/data/stardewvalleywiki-01-2026.zim"]
    ports:
      - "8083:8080"
    restart: unless-stopped