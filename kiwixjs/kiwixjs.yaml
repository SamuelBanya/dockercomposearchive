version: '3.8'

services:
  kiwix-js:
    image: nginx:alpine
    container_name: kiwix-js
    ports:
      - "8090:80"
    volumes:
      - /home/sam/kiwix-js/kiwix-js-pwa/www:/usr/share/nginx/html:ro
      - /home/sam/kiwix-js/kiwix-js-pwa/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/sam/kiwix-js/kiwix-js-pwa/ZimFiles:/data:ro
    restart: unless-stopped